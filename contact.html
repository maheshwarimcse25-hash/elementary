<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact Us</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="team.html">Team</a>
  <a href="contact.html">Contact</a>
</nav>

<section style="text-align:center; padding:50px;">
  <h2>Contact Us</h2>
  <p>We hear from you</p>

  <form>
    <input type="text" placeholder="Full Name" size="50" required><br>
<br>
    <input type="email" placeholder="Email Address" size="50" required><br>
<br>
    <textarea rows="5" cols="42" placeholder="Your Message" size="50" required></textarea><br>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p align="center">2026 Precision Tools Inc.</p>
</footer>

  
<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();
const data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
message: document.getElementById("message").value
};

const response = await fetch("http://localhost:3000/contact", {
method: "POST",
headers: {
"Content-Type": "application/json"
 },
 body: JSON.stringify(data)
 });

const result = await response.json();
document.getElementById("responseMsg").innerText = result.message;
});
</script>

</body>
</html>
